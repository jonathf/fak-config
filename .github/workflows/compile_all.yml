on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  compile:
    name: Compile all keymaps
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: DeterminateSystems/nix-installer-action@main
      - run: |
          nix develop .#container --command fak compile_all
          mv .fak_cache fak_cache
      - uses: actions/upload-artifact@v6
        with:
          name: firmware
          path: 'fak_cache/*.ihx'
      - uses: actions/download-artifact@v6
        with:
          patern: firmware
